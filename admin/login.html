<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gnomeo Admin Login</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f7fb;
        --panel: #ffffff;
        --text: #172033;
        --muted: #667085;
        --border: #d9e0ea;
        --shadow: 0 10px 30px rgba(23, 32, 51, 0.08);
        --accent: #4b74ff;
        --accent-soft: #eaf0ff;
        --bad: #f04438;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: var(--bg);
        color: var(--text);
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      .card {
        width: min(480px, 100%);
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 20px;
        box-shadow: var(--shadow);
        padding: 28px;
      }
      .eyebrow {
        margin: 0 0 8px;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        font-size: 12px;
        color: var(--muted);
      }
      h1 { margin: 0 0 12px; font-size: 34px; line-height: 1.05; }
      p { margin: 0 0 14px; color: var(--muted); line-height: 1.55; }
      label { display: block; margin-bottom: 6px; font-size: 13px; color: var(--muted); }
      input, button {
        width: 100%;
        border-radius: 12px;
        border: 1px solid var(--border);
        font: inherit;
      }
      input {
        padding: 12px 14px;
        margin-bottom: 12px;
      }
      input:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 4px var(--accent-soft);
      }
      button {
        padding: 12px 14px;
        background: var(--accent);
        color: #fff;
        border-color: var(--accent);
        font-weight: 600;
        cursor: pointer;
      }
      .error { min-height: 1.2em; margin-top: 12px; color: var(--bad); }
      .small { font-size: 13px; }
    </style>
  </head>
  <body>
    <main class="card">
      <p class="eyebrow">Private access</p>
      <h1>Gnomeo Admin</h1>
      <p>Enter the admin secret to open the protected portal.</p>
      <form id="loginForm">
        <label for="secret">Admin secret</label>
        <input id="secret" name="secret" type="password" autocomplete="current-password" required />
        <button type="submit">Sign in</button>
      </form>
      <p id="error" class="error small" aria-live="polite"></p>
      <p class="small">Protected pages and admin APIs use separate server-side access controls.</p>
    </main>

    <script>
      const form = document.getElementById('loginForm');
      const input = document.getElementById('secret');
      const error = document.getElementById('error');

      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        error.textContent = '';
        try {
          const response = await fetch('/api/admin/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ secret: input.value }),
          });
          const text = await response.text();
          let data = null;
          try { data = text ? JSON.parse(text) : null; } catch { data = null; }
          if (!response.ok) {
            throw new Error(data?.error || text || 'Sign-in failed');
          }
          window.location.href = '/admin/';
        } catch (err) {
          error.textContent = err.message || 'Sign-in failed';
          input.value = '';
          input.focus();
        }
      });
    </script>
  </body>
</html>
